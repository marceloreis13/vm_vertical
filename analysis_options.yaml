# Shared analyzer/lint configuration for the whole workspace (root app and
# every package under apps/ and packages/). Member packages should include
# this file with a relative path, e.g. `include: ../../analysis_options.yaml`.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    implementation_imports: error

linter:
  rules:
    # Barrel pattern enforcement: only `lib/<package>.dart` is public API;
    # `lib/src/` is private and must never be imported from outside the package.
    implementation_imports: true
    always_declare_return_types: true
    avoid_dynamic_calls: true
    cancel_subscriptions: true
    close_sinks: true
    prefer_final_locals: true
    prefer_single_quotes: true
    require_trailing_commas: true
    unawaited_futures: true
    unnecessary_await_in_return: true
    use_super_parameters: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
