name: vm_connectivity
description: >
  Injectable, observable online/offline connectivity module for the vm_core
  platform: a sealed ConnectivityState (Online(type) | Offline) driven by an
  injectable ConnectivitySource that hides connectivity_plus entirely, a
  ConnectivityCubit any module or the UI can watch, an offline banner
  composed from vm_storyboard, and a real bridge into vm_network's own
  connectivity gate with the dependency inverted so vm_network never depends
  on this module.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^6.0.0
  flutter_bloc: ^9.0.0
  freezed_annotation: ^2.4.0
  get_it: ^8.0.0
  json_annotation: ^4.9.0
  vm_network:
    path: ../vm_network
  vm_storyboard:
    path: ../vm_storyboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  injectable_generator: ^2.6.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
