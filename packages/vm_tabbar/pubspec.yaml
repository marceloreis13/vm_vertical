name: vm_tabbar
description: >
  Declarative, app-configured bottom tab-bar shell for the vm_core platform:
  a VmTabBar view and VmTabBarCubit built on vm_navigation's VmShellRoute
  (state-preserving branches), with app-injected VmTab configuration and
  VmTabBarStyle tokens. No dependency on vm_storyboard.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  freezed_annotation: ^2.4.0
  get_it: ^8.0.0
  go_router: ^16.2.4
  injectable: ^2.5.0
  vm_navigation:
    path: ../vm_navigation

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
