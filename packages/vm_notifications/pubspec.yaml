name: vm_notifications
description: >
  Provider-agnostic push and local notifications module for the vm_core
  platform: a single NotificationService facade unifying push (token,
  foreground/background messages, taps) and local scheduling (schedule,
  cancel, cancelAll, channels), pluggable PushProvider/LocalScheduler ports
  with a built-in in-memory fake, an injected NotificationRouter tap-to-route
  seam (no vm_navigation dependency) and an optional enabled gate (no
  vm_config dependency), and injected configuration.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  freezed_annotation: ^2.4.0
  get_it: ^8.0.0
  json_annotation: ^4.9.0
  vm_storyboard:
    path: ../vm_storyboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
