name: vm_config
description: >
  Injectable, source-agnostic configuration module for the vm_core platform:
  a single ConfigReader interface (typed environment, feature flags, remote
  config) with synchronous never-failing reads, an observable change stream,
  a pluggable pull-based RemoteConfigProvider port, an optional ConfigCache
  seam (no vm_storage dependency), and injected configuration. Hides the
  remote source entirely.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.0
  flutter_bloc: ^9.0.0
  freezed_annotation: ^2.4.0
  get_it: ^8.0.0
  vm_storyboard:
    path: ../vm_storyboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
