name: vm_analytics
description: >
  Provider-agnostic product analytics for the vm_core platform: a single
  AnalyticsTracker interface (logEvent, setUserProperty, screenView,
  setUserId, reset) multiplexed to N pluggable AnalyticsProvider
  implementations with per-provider fire-and-forget error isolation,
  built-in noop/debug providers, automatic screen tracking via
  vm_navigation, and injected configuration. Hides the vendor SDK entirely.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  freezed_annotation: ^2.4.0
  get_it: ^8.0.0
  go_router: ^16.2.4
  vm_navigation:
    path: ../vm_navigation
  vm_storyboard:
    path: ../vm_storyboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
