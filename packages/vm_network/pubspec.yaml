name: vm_network
description: >
  Generic, injectable HTTP client module for the vm_core platform: typed
  results and failures, interceptors (auth, headers, retry, logging), and
  injected configuration. Hides the underlying transport library (Dio).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_bloc: ^9.0.0
  get_it: ^8.0.0
  vm_storyboard:
    path: ../vm_storyboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  freezed_annotation: ^2.4.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  mocktail: ^1.0.0
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
