name: vm_navigation
description: >
  Typed, injectable routing module for the vm_core platform: per-module
  List<RouteBase> registration, a generic route-guard contract with
  conditional redirect, and a BuildContext-free navigator service. Wraps
  go_router; no dependency on vm_auth or vm_config.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  go_router: ^16.2.4
  flutter_bloc: ^9.0.0
  get_it: ^8.0.0
  vm_storyboard:
    path: ../vm_storyboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  freezed_annotation: ^2.4.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
