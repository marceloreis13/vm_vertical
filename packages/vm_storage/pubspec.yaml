name: vm_storage
description: >
  Local persistence module for the vm_core platform: typed key-value, secure
  and document stores behind stable interfaces, with a Result/StorageFailure
  taxonomy and injected configuration. Hides the underlying backends
  (shared_preferences, flutter_secure_storage, Hive CE).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  freezed_annotation: ^2.4.0
  get_it: ^8.0.0
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.2.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  vm_storyboard:
    path: ../vm_storyboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
